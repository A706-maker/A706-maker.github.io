<!DOCTYPE html>
<html>
  <head>
    <title>Poll</title>
    <link rel="stylesheet" href="styles.css">
    <script src="poll-vue.js" defer></script>
    
    <!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<!-- Your config -->
<script src="supabase-config.js" defer></script>

<!-- Your updated poll script -->
<script src="poll-vue.js" defer></script>
  </head>
  
  <body>

    <!-- Start Screen -->
    <div id="start-screen">
      <h1>Sydney Housing Quiz</h1>
      <p>Test your knowledge</p>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Progress Bar -->
    <div id="progress-container" class="hidden">
      <div id="progress-bar"></div>
    </div>

    <!-- Quiz Questions -->
    <div id="poll-container" class="hidden"></div>

    <!-- Final Score Screen -->
    <div id="result-screen" class="hidden">
      <h2>Your Score</h2>
      <p id="score-text"></p>
      <button id="retry-btn">Retake Quiz</button>
      <button id="home-btn">Back to Home</button>
    </div>

  </body>
</html>
